<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="p-3 text-bg-dark"> 
        <div class="container"> 
            <div class="d-flex flex-wrap align-items-center justify-content-center justify-content-lg-start"> 
                <a href="/" class="d-flex align-items-center mb-2 mb-lg-0 text-white text-decoration-none"> 
                    <svg class="bi me-2" width="40" height="32" role="img" aria-label="Bootstrap">
                        <use xlink:href="#bootstrap"></use>
                    </svg> 
                </a> 
                <ul class="nav col-12 col-lg-auto me-lg-auto mb-2 justify-content-center mb-md-0"> 
                    <li>
                        <a href="#" class="nav-link px-2 text-secondary">Home</a>
                    </li> 
                    <li>
                        <a href="#" class="nav-link px-2 text-white">Features</a>
                    </li> 
                    <li>
                        <a href="#" class="nav-link px-2 text-white">Pricing</a>
                    </li> 
                    <li>
                        <a href="#" class="nav-link px-2 text-white">FAQs</a>
                    </li> 
                    <li>
                        <a href="#" class="nav-link px-2 text-white">About</a>
                    </li> 
                </ul> 
                <form class="col-12 col-lg-auto mb-3 mb-lg-0 me-lg-3" role="search"> <input type="search" class="form-control form-control-dark text-bg-dark" placeholder="Search..." aria-label="Search" id="search"> </form> 
                <div class="text-end"> 
                    <button type="button" class="btn btn-outline-light me-2">Login</button> 
                    <button type="button" class="btn btn-warning">Sign-up</button> 
                </div> 
            </div> 
        </div> 
    </header>
    <div class="container">
        <div class="box">
            <div class="box1">
                <div class="title">Thêm sinh viên</div>
                <form>
                    <input class="inputName" type="text" placeholder="Nhập Họ Tên">
                    <input class="inputScore" type="number" placeholder="Nhập Điểm">
                </form>
                <button class="btnAdd">Thêm</button>
            </div>
            <select id="filter">
                <option value="all">Tất cả</option>
                <option value="Giỏi">Giỏi</option>
                <option value="Khá">Khá</option>
                <option value="Trung bình">Trung bình</option>
                <option value="Yếu">Yếu</option>
            </select>
        </div>    
        <div class="box2">
            <table border="2" >
                <thead>
                    <tr>
                        <th>STT</th>
                        <th>Họ tên</th>
                        <th id="sortScore">Điểm</th>
                        <th>Xếp loại</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
            <p id="statistic">
            Tổng sinh viên: 0 | Điểm trung bình: 0
            </p>
            <p id="noResult" style="display:none; color:red;">
                Không có kết quả
            </p>
        </div>
    </div>
 



    <script src="node.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
