<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
      href="https://fonts.googleapis.com/css2?family=Raleway:wght@700&family=Oleo+Script:wght@700&family=Quicksand:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
</head>
<body>
    <div class="container">
        <div class="background">
            <header class="head">
            <div class="title">TRAVEL GOALS</div>
            <div class="nav">
                <div class="destination">Destination</div>
                <div class="about">About</div>
            </div>
            </header>
            <div class="box">
                <div class="section1">
                    <div class="p1">JOE'S TRAVEL PAGE</div>
                    <div class="p2">LET'S EXPLORE THE WORLD TOGETHER</div>
                    <button class="button">Discover places</button>
                </div>
            </div>
        </div>
        <div class="section2">
            <div class="maintitle">HIGHTLIGHTS</div>
            <div class="image">
                <div class="image1">
                    <img class="picture" src="miami.jpg">
                    <div class="note-u">MIAMI <span class="highlight"> USA</span></div>
                </div>
                <div class="image1">
                    <img class="picture" src="munich.jpg">
                    <div class="note-u">MUNICH <span class="highlight"> GERMANY</span></div>
                </div>
                <div class="image1">
                    <img class="picture" src="barcelona.jpg">
                    <div class="note-u">BARCELONA <span class="highlight"> SPAIN</span></div>
                </div>
            </div>
        </div>
        <footer class="footer">
            <i class="fa-brands fa-instagram"></i>
            <i class="fa-brands fa-facebook"></i>
        </footer>
    </div>

</html>
