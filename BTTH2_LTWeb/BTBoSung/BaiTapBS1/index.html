<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h3 class="title">Get in toach with us by filling contact form below</h3>
        <form action="">
            <div class="box">
                <input type="text" placeholder="* Enter your full name" class="name">
                <input type="text" placeholder="* Enter your email adress" class="email">
            </div>
            <input type="text" placeholder="* Enter your subject" class="subject">
            <textarea placeholder="* Your message here..." class="message"></textarea>
            <div class="foot">
                <button class="button" type="submit">Send message</button>
                <div class="note">* Please fill all required form field, thanks!</div>
            </div>
            
        </form>
    </div>

    
</body>
</html>
